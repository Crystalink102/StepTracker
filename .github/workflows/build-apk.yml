name: Build Android

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'
      build_type:
        description: 'Build type'
        required: true
        default: 'apk'
        type: choice
        options:
          - apk
          - aab

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK
        if: ${{ inputs.build_type == 'apk' }}
        run: eas build --platform android --profile preview --local --non-interactive --output ./5tepTracker.apk

      - name: Build AAB (Production)
        if: ${{ inputs.build_type == 'aab' }}
        run: eas build --platform android --profile production --local --non-interactive --output ./5tepTracker.aab

      - name: Create GitHub Release (APK)
        if: ${{ inputs.build_type == 'apk' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: 5tepTracker ${{ inputs.version }}
          body: |
            ## 5tepTracker ${{ inputs.version }}

            Download the APK below and install it on your Android device.
          files: ./5tepTracker.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release (AAB)
        if: ${{ inputs.build_type == 'aab' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: 5tepTracker ${{ inputs.version }} (Play Store)
          body: |
            ## 5tepTracker ${{ inputs.version }}

            Production AAB for Google Play Store upload.
          files: ./5tepTracker.aab
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
